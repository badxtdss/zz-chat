name: zz-backup
on:
  schedule:
    - cron: '0 * * * *'  # 每小时整点
  workflow_dispatch:      # 手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 下载备份数据
        run: |
          curl -sf "https://ai0000.cn/zz/backup?key=${{ secrets.BACKUP_KEY }}" \
            -o zz-backup.json
          echo "条目数: $(cat zz-backup.json | jq '.count')"

      - name: 验证数据
        run: |
          if [ ! -s zz-backup.json ]; then
            echo "::error::备份文件为空"
            exit 1
          fi
          if jq -e '.data' zz-backup.json > /dev/null 2>&1; then
            echo "✅ 数据验证通过"
          else
            echo "::error::JSON 格式错误"
            exit 1
          fi

      - name: 提交到仓库
        run: |
          git config user.name "zz-backup-bot"
          git config user.email "backup@zz-chat.local"
          git add zz-backup.json
          git diff --cached --quiet || git commit -m "自动备份 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
