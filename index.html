<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🦞 爪爪</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a1628,#0f3460,#16213e);color:#e0e0e0;height:100vh;-webkit-text-size-adjust:100%}
.top-bar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:rgba(15,52,96,.9);backdrop-filter:blur(10px);z-index:10;border-bottom:1px solid rgba(79,195,247,.15)}
.top-bar .l{display:flex;align-items:center;gap:10px}
.top-bar .r{display:flex;gap:10px}
.top-bar .a{background:none;border:none;color:#4fc3f7;font-size:14px;cursor:pointer;padding:6px 10px}
.top-bar .b{background:#e94560;border:none;color:#fff;font-size:13px;border-radius:8px;padding:6px 12px;cursor:pointer}
.top-bar .b:hover{background:#c73e54}
.badge{font-size:12px;color:#8892b0}
body{padding-top:56px}
.main-view{display:flex;flex-direction:column;height:calc(100vh - 56px)}
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px}
.home .emoji{font-size:72px}
.home h1{font-size:26px;font-weight:600}
.home p{color:#8892b0;font-size:15px;text-align:center;max-width:320px;line-height:1.6}
.btn{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;width:100%;max-width:300px;transition:all .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(46,134,193,.4)}
.btn.danger{background:linear-gradient(135deg,#c0392b,#e74c3c)}
.btn.danger:hover{box-shadow:0 4px 15px rgba(231,76,60,.4)}
.hint{color:#5a6a8a;font-size:12px;text-align:center;margin-top:8px}
.actions{display:flex;gap:12px;width:100%;max-width:300px}
.actions .btn{flex:1;padding:14px 8px}
</style>
</head>
<body>

<div class="top-bar">
  <div class="l"><span class="badge" id="myBadge">我的编号 …</span></div>
  <div class="r">
    <button class="b" id="addBtn">➕ 添加朋友</button>
    <button class="a" onclick="genQR()">📱 二维码</button>
  </div>
</div>

<div class="main-view">
  <div class="home" id="homeView">
    <div class="emoji">🦞</div>
    <h1>爪爪</h1>
    <p>手机直连 OpenClaw<br>消息通过你的 AI 处理</p>
    <div class="actions">
      <button class="btn danger" onclick="openOC()">🤖 对话</button>
    </div>
    <p class="hint">点击上方按钮开始对话</p>
  </div>
</div>

<script>
const API = new URLSearchParams(location.search).get('api') || 'https://ai0000.cn/zz/';
let myId = null;

const $ = id => document.getElementById(id);

function genId() { return 'uuid-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8); }

async function init() {
  const p = new URLSearchParams(location.search);
  const bridge = p.get('bridge');
  if (!bridge) { alert('请扫描二维码进入'); return; }
  myId = bridge;
  localStorage.setItem('zz_id', myId);
  history.replaceState(null, '', location.pathname);
  $('myBadge').textContent = `我的编号 ${myId}`;
}

function openOC() { window.location.href = 'chat.html?id=' + myId; }

function genQR() {
  const url = location.origin + location.pathname + '?bridge=' + myId;
  const img = document.createElement('img');
  img.src = 'https://quickchart.io/qr?text=' + encodeURIComponent(url) + '&size=200';
  img.style.cssText = 'border-radius:12px';
  alert('扫码地址:\n' + url);
}

// 添加朋友弹窗
$('addBtn').addEventListener('click', () => {
  const target = prompt('输入对方编号:');
  if (!target || !/^\d+$/.test(target) || target === myId) return;
  // 发送好友请求（通过 Worker PUT）
  fetch(API, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ msg_id: genId(), from: myId, to: target, content: '🤝 好友请求', ts: Date.now() })
  }).then(() => alert('已发送好友请求！')).catch(() => alert('发送失败'));
});

init();
</script>
</body>
</html>
